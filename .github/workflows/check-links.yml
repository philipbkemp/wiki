name: Check links

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: {} # click "Run workflow" in the Actions tab to trigger this manually

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Run link check
        run: node docs/linkchecker/check.js

      - name: Commit updated urls.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/linkchecker/urls.json
          git diff --cached --quiet && echo "No changes" || git commit -m "Update link check results"
          git push
