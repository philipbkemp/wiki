name: Check squads

on:
  workflow_dispatch: {} # click "Run workflow" in the Actions tab to trigger this manually

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: squadchecker
        run: npm install

      - name: Run squad check
        run: node squadchecker/squad-check.js

      - name: Commit updated squads.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add squadchecker/squads.json
          git diff --cached --quiet && echo "No changes" || git commit -m "Update squad check results"
          git push